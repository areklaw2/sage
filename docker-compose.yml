services:
  db:
    image: pgvector/pgvector:pg18
    container_name: sage-db
    environment:
      POSTGRES_DB: sage
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - '5432:5432'
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U postgres -d sage']
      interval: 5s
      timeout: 5s
      retries: 5
    volumes:
      - pgdata:/var/lib/postgresql
volumes:
  pgdata:

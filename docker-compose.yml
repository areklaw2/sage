services:
  db:
    image: pgvector/pgvector:pg18
    container_name: sage-db
    environment:
      POSTGRES_DB: sage
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - '5432:5432'
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U postgres -d sage']
      interval: 5s
      timeout: 5s
      retries: 5
    volumes:
      - pgdata:/var/lib/postgresql
  ollama:
    image: ollama/ollama
    container_name: sage-ollama
    ports:
      - '11434:11434'
    volumes:
      - ollama_data:/root/.ollama
    healthcheck:
      test: ['CMD-SHELL', 'ollama list || exit 1']
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s
volumes:
  pgdata:
  ollama_data:
